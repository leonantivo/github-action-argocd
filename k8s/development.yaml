apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-action-argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-action-argocd
  template:
    metadata:
      labels:
        app: github-action-argocd
    spec:
      containers:
        - name: github-action-argocd
          image: localhost:5000/github-action-argocd:latest
          ports:
            - containerPort: 9091 # The port your app listens on inside the container
---
apiVersion: v1
kind: Service
metadata:
  name: github-action-argocd
spec:
  type: NodePort
  selector:
    app: github-action-argocd
  ports:
    - port: 80          # The port used to access the service inside the cluster
      targetPort: 9091  # Routes to the containerPort defined above
      nodePort: 30091   # External port on the Node (Must be 30000-32767)
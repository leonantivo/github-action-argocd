apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name:  java-githubaction-argocd
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/leonantivo/github-action-argocd.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: my-spb-githubaction-argocd
  
  syncPolicy:
    syncOptions: 
      - CreateNamespace=true

    automated:
      prune: true
      selfHeal: true